version: '3.8'

services:
  # ── MosaicDB (Production) ──────────────────────────────────
  mosaic:
    build:
      context: .
      dockerfile: Dockerfile
    image: mosaicdb:latest
    container_name: mosaicdb
    hostname: mosaic
    environment:
      PORT: "4040"
      MIX_ENV: prod
      MOSAIC_STORAGE_PATH: /var/lib/mosaic/shards
      MOSAIC_EMBEDDING_MODEL_NAME: all-MiniLM-L6-v2
      MOSAIC_EMBEDDING_PROVIDER: local
      MOSAIC_AUTH_ENABLED: "false"
      MOSAIC_JWT_SECRET: "${MOSAIC_JWT_SECRET:-change-me-in-production}"
      MOSAIC_CACHE_BACKEND: ets
      MOSAIC_INDEX_STRATEGY: hnsw
      CLUSTER_SECRET: "${CLUSTER_SECRET:-mosaic-secret}"
      SQLITE_VEC_PATH: /app/deps/sqlite_vec/priv/0.1.5/vec0.so
    ports:
      - "4040:4040"
    volumes:
      - mosaic_shards:/var/lib/mosaic/shards
      - mosaic_config:/var/lib/mosaic/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4040/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4'
        reservations:
          memory: 1G
          cpus: '2'
    networks:
      - mosaic

  # ── Redis (Distributed caching) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mosaic-redis
    hostname: redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - redis-net
      - mosaic

  # ── Nginx (API gateway + load balancer) ────────────────────
  nginx:
    image: nginx:alpine
    container_name: mosaic-nginx
    hostname: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      mosaic:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - mosaic

  # ── Prometheus (Metrics) ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mosaic-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    networks:
      - mosaic

  # ── Grafana (Dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mosaic-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mosaic

  # ── k6 Load Testing (optional profile) ────────────────────
  k6:
    image: grafana/k6:latest
    profiles: ["load-test"]
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      mosaic:
        condition: service_healthy
    networks:
      - mosaic

volumes:
  mosaic_shards:
    driver: local
  mosaic_config:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  mosaic:
  redis-net:
