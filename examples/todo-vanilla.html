<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MosaicDB Todo — Vanilla JS (Reified from S-Expression DSL)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; min-height: 100vh; }
  [data-variant="primary"] { background: #3b82f6; color: white; border: none; }
  [data-variant="default"] { background: #e5e7eb; color: #374151; border: none; }
  [data-variant="ghost"] { background: transparent; border: none; cursor: pointer; }
  [data-variant="primary"]:hover { background: #2563eb; }
  [data-variant="default"]:hover { background: #d1d5db; }
  [data-variant="ghost"]:hover { background: #f3f4f6; }
  [data-bg="blue-600"] { background: #2563eb; }
  [data-bg="gray-50"] { background: #f9fafb; }
  [data-bg="green-50"] { background: #f0fdf4; }
  [data-bg="white"] { background: white; }
  [data-color="white"] { color: white; }
  [data-color="blue-100"] { color: #dbeafe; }
  [data-color="gray-500"] { color: #6b7280; }
  [data-color="gray-400"] { color: #9ca3af; }
  [data-color="gray-800"] { color: #1f2937; }
  [data-color="gray-700"] { color: #374151; }
  [data-color="red-500"] { color: #ef4444; }
  [data-color="green-500"] { color: #22c55e; }
  [data-font="bold"] { font-weight: 700; }
  [data-font-size="xl"] { font-size: 1.25rem; }
  [data-font-size="lg"] { font-size: 1.125rem; }
  [data-font-size="base"] { font-size: 1rem; }
  [data-font-size="sm"] { font-size: 0.875rem; }
  [data-padding="1rem"] { padding: 1rem; }
  [data-padding="1.5rem"] { padding: 1.5rem; }
  [data-padding="2rem"] { padding: 2rem; }
  [data-padding="0.75rem"] { padding: 0.75rem; }
  [data-padding-top="1rem"] { padding-top: 1rem; }
  [data-margin-top="1.5rem"] { margin-top: 1.5rem; }
  [data-margin-top="2rem"] { margin-top: 2rem; }
  [data-margin-bottom="0.5rem"] { margin-bottom: 0.5rem; }
  [data-margin-x="auto"] { margin-left: auto; margin-right: auto; }
  [data-max-width="600px"] { max-width: 600px; }
  [data-shadow="sm"] { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  [data-shadow="md"] { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  [data-radius="lg"] { border-radius: 0.5rem; }
  [data-radius="md"] { border-radius: 0.375rem; }
  [data-border="true"] { border: 1px solid #d1d5db; }
  [data-border-top="true"] { border-top: 1px solid #e5e7eb; }
  [data-border-color="gray-200"] { border-color: #e5e7eb; }
  [data-text-align="center"] { text-align: center; }
  [data-text-decoration="line-through"] { text-decoration: line-through; }
  [data-style-type="none"] { list-style-type: none; }
  [data-flex="1"] { flex: 1; }
  [data-gap="0.5rem"] { gap: 0.5rem; }
  [data-gap="0.75rem"] { gap: 0.75rem; }
  [data-layout] { display: flex; }
  [data-align="center"] { align-items: center; }
  [data-justify="between"] { justify-content: space-between; }
  button { padding: 0.5rem 1rem; border-radius: 0.375rem; font-size: 0.875rem; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type="text"] { padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.875rem; outline: none; width: 100%; }
  input[type="text"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
  input[type="checkbox"] { width: 1.25rem; height: 1.25rem; cursor: pointer; }
  [data-variant="ghost"][data-color="red-500"]:hover { background: #fef2f2; }
</style>
</head>
<body>
  <header data-bg="blue-600" data-padding="1rem">
    <h1 data-color="white" data-font="bold" data-font-size="xl">MosaicDB Todo</h1>
    <p data-color="blue-100">Reified from S-Expression DSL — Zero-Framework Edition</p>
  </header>

  <main data-max-width="600px" data-margin-x="auto" data-padding="2rem">
    <section>
      <div data-padding="1.5rem" data-shadow="md" data-radius="lg" data-bg="white">
        <form id="todo-form">
          <div data-layout data-gap="0.5rem">
            <input data-flex="1" type="text" id="todo-input" placeholder="What needs to be done?" />
            <button type="submit" data-variant="primary" data-size="md">Add</button>
          </div>
        </form>
      </div>

      <section data-margin-top="1.5rem">
        <div data-layout data-gap="0.5rem" id="filters">
          <button data-variant="primary" data-filter="all">All</button>
          <button data-variant="default" data-filter="active">Active</button>
          <button data-variant="default" data-filter="completed">Completed</button>
        </div>
      </section>

      <section data-margin-top="1.5rem">
        <div id="empty-state" data-padding="2rem" data-bg="gray-50" data-text-align="center">
          <p data-color="gray-500" data-font-size="lg">No todos yet. Add one above!</p>
        </div>
        <ul data-style-type="none" data-padding="0" data-margin="0" id="todo-list"></ul>
      </section>
    </section>

    <footer data-margin-top="2rem" data-padding-top="1rem" data-border-top="true" data-border-color="gray-200">
      <div data-layout data-justify="between" data-align="center">
        <p data-font-size="sm" data-color="gray-500"><span id="active-count">0</span> items left</p>
        <button data-variant="ghost" data-size="sm" data-color="red-500" id="clear-completed">Clear completed</button>
      </div>
    </footer>
  </main>

<script>
(function() {
  let todos = [
    { id: 1, text: "Learn MosaicDB S-Expression DSL", completed: false },
    { id: 2, text: "Reify to React/Vue/HTML", completed: false },
    { id: 3, text: "Deploy with hot reload", completed: true },
  ];
  let nextId = 4;
  let filter = "all";

  const input = document.getElementById("todo-input");
  const list = document.getElementById("todo-list");
  const empty = document.getElementById("empty-state");
  const activeCount = document.getElementById("active-count");
  const clearBtn = document.getElementById("clear-completed");

  function render() {
    const filtered = filter === "all" ? todos :
      filter === "active" ? todos.filter(t => !t.completed) :
      todos.filter(t => t.completed);

    empty.style.display = filtered.length === 0 ? "" : "none";
    list.style.display = filtered.length === 0 ? "none" : "";

    list.innerHTML = filtered.map(todo => `
      <li data-margin-bottom="0.5rem">
        <div data-padding="1rem" data-shadow="sm" data-radius="md" data-bg="${todo.completed ? 'green-50' : 'white'}">
          <div data-layout data-align="center" data-gap="0.75rem">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} data-id="${todo.id}">
            <p data-flex="1" data-font-size="base" data-color="${todo.completed ? 'gray-400' : 'gray-800'}"
               data-text-decoration="${todo.completed ? 'line-through' : 'none'}">${escapeHtml(todo.text)}</p>
            <button data-variant="ghost" data-size="sm" data-color="red-500" data-delete="${todo.id}">×</button>
          </div>
        </div>
      </li>
    `).join("");

    const act = todos.filter(t => !t.completed).length;
    const comp = todos.filter(t => t.completed).length;
    activeCount.textContent = act;
    clearBtn.disabled = comp === 0;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  document.getElementById("todo-form").addEventListener("submit", e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    todos.push({ id: nextId++, text, completed: false });
    input.value = "";
    render();
  });

  list.addEventListener("click", e => {
    const id = parseInt(e.target.dataset.id || e.target.closest("[data-id]")?.dataset.id);
    const delId = parseInt(e.target.dataset.delete || e.target.closest("[data-delete]")?.dataset.delete);
    if (id) { const t = todos.find(x => x.id === id); if (t) { t.completed = !t.completed; render(); } }
    if (delId) { todos = todos.filter(x => x.id !== delId); render(); }
  });

  list.addEventListener("change", e => {
    const id = parseInt(e.target.dataset.id);
    if (id) { const t = todos.find(x => x.id === id); if (t) { t.completed = e.target.checked; render(); } }
  });

  document.getElementById("filters").addEventListener("click", e => {
    if (e.target.dataset.filter) {
      filter = e.target.dataset.filter;
      document.querySelectorAll("#filters button").forEach(b =>
        b.setAttribute("data-variant", b.dataset.filter === filter ? "primary" : "default"));
      render();
    }
  });

  clearBtn.addEventListener("click", () => {
    todos = todos.filter(t => !t.completed);
    render();
  });

  render();
})();
</script>
</body>
</html>
