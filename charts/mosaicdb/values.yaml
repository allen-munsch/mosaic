# ── MosaicDB Helm Chart Values ──────────────────────────────────
# helm install mosaicdb ./charts/mosaicdb --set persistence.enabled=true

replicaCount: 1

image:
  repository: mosaicdb
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  fsGroup: 999

# ── Service ─────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 4040

# ── Ingress ──────────────────────────────────────────────────────
ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: mosaicdb.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── Persistence ─────────────────────────────────────────────────
persistence:
  enabled: true
  accessMode: ReadWriteOnce
  size: 50Gi
  storageClass: ""

# ── Resources ───────────────────────────────────────────────────
resources:
  requests:
    memory: 2Gi
    cpu: 1000m
  limits:
    memory: 8Gi
    cpu: 4000m

# ── Autoscaling ────────────────────────────────────────────────
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Pod Disruption Budget ───────────────────────────────────────
# WARNING: Do NOT enable PDB with replicaCount=1 and minAvailable=1 — it blocks node drains.
# Use maxUnavailable=1 or set minAvailable < replicaCount.
podDisruptionBudget:
  enabled: false
  maxUnavailable: 1

# ── Network Policy ──────────────────────────────────────────────
networkPolicy:
  enabled: false

# ── Authentication ──────────────────────────────────────────────
auth:
  enabled: false
  jwtSecret: ""        # auto-generated if empty
  apiKeyEncryptionKey: ""  # auto-generated if empty

# ── MCP Server ─────────────────────────────────────────────────
mcp:
  enabled: false

# ── MosaicDB Configuration ──────────────────────────────────────
config:
  storagePath: /var/lib/mosaic/shards
  routingDbPath: /var/lib/mosaic/config/index.db
  embeddingModel: local
  embeddingDim: 384
  embeddingProvider: bumblebee
  indexStrategy: hnsw
  cacheBackend: ets
  defaultResultLimit: 20
  minSimilarity: 0.1
  queryTimeout: 10000
  graphEnabled: true
  handleRegistryEnabled: true

# ── Redis (optional, distributed cache) ─────────────────────────
redis:
  enabled: false
  url: "redis://redis:6379/1"

# ── Cluster (Erlang distribution) ────────────────────────────────
cluster:
  enabled: false
  secret: mosaic-cluster-secret
  gossipPort: 45892

# ── Monitoring ──────────────────────────────────────────────────
monitoring:
  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics
    labels: {}

# ── Node Selection ──────────────────────────────────────────────
nodeSelector: {}
tolerations: []
affinity: {}

# ── Remote Storage (S3/MinIO) ──────────────────────────────────
remoteStorage:
  enabled: false
  backend: local          # local | s3
  bucket: mosaic-shards
  endpoint: ""            # http://minio:9000 for MinIO
  accessKey: ""
  secretKey: ""
  region: us-east-1
  syncEnabled: false
  syncIntervalMs: 60000

# ── Extra ───────────────────────────────────────────────────────
extraVolumes: []
extraVolumeMounts: []
extraEnv: []
