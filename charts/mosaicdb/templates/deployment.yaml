apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mosaicdb.fullname" . }}
  labels:
    {{- include "mosaicdb.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "mosaicdb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "mosaicdb.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mosaicdb.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            {{- if .Values.mcp.enabled }}
            - name: mcp
              containerPort: 4041
              protocol: TCP
            {{- end }}
          env:
            - name: PORT
              value: {{ .Values.service.port | quote }}
            - name: STORAGE_PATH
              value: {{ .Values.config.storagePath | quote }}
            - name: ROUTING_DB_PATH
              value: {{ .Values.config.routingDbPath | quote }}
            - name: EMBEDDING_DIM
              value: {{ .Values.config.embeddingDim | quote }}
            - name: MOSAIC_QUIET
              value: "1"
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: CACHE_BACKEND
              value: "redis"
            {{- end }}
            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: shards
              mountPath: {{ .Values.config.storagePath }}
              {{- if .Values.persistence.subPath }}
              subPath: {{ .Values.persistence.subPath }}
              {{- end }}
            - name: config
              mountPath: {{ .Values.config.routingDbPath | dir }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: shards
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "mosaicdb.fullname" . }}-shards
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          emptyDir: {}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
