{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "mosaicdb.fullname" . }}
  labels:
    {{- include "mosaicdb.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels: {{ include "mosaicdb.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      interval: {{ .Values.monitoring.serviceMonitor.interval | default "30s" }}
      path: {{ .Values.monitoring.serviceMonitor.path | default "/metrics" }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
