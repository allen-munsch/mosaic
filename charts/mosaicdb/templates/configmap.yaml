apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mosaicdb.fullname" . }}-config
  labels:
    {{- include "mosaicdb.labels" . | nindent 4 }}
data:
  port: {{ .Values.service.port | quote }}
  index_strategy: {{ .Values.config.indexStrategy | quote }}
  cache_backend: {{ .Values.config.cacheBackend | quote }}
  min_similarity: {{ .Values.config.minSimilarity | quote }}
  query_timeout: {{ .Values.config.queryTimeout | quote }}
  graph_enabled: {{ .Values.config.graphEnabled | quote }}
  mcp_enabled: {{ .Values.config.mcpEnabled | quote }}
  handle_registry_enabled: {{ .Values.config.handleRegistryEnabled | quote }}
